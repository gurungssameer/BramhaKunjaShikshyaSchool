<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form 2082</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f3f6ff, #e6f0ff);
            min-height: 100vh;
            margin: 0;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px 40px;
            color: #1a1a1a;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #0066ff;
        }

        .hero p {
            font-size: 1.2rem;
            color: #555;
        }

        /* Form Section */
        .admission-form {
            max-width: 700px;
            margin: -40px auto 60px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .admission-form:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 70px rgba(0,0,0,0.25);
        }

        .admission-form h2 {
            text-align: center;
            color: #0066ff;
            margin-bottom: 25px;
        }

        .form-floating input,
        .form-floating textarea {
            border-radius: 10px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #0066ff, #004dcc);
            color: #fff;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,102,255,0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2rem;
            }

            .admission-form {
                margin: -20px 20px 40px;
                padding: 30px;
            }
        }
        #topBackHomeBtn {
    font-weight: 600;
    border-radius: 8px;
    transition: all 0.3s ease;
}

#topBackHomeBtn:hover {
    background: #0066ff;
    color: #fff;
    transform: translateY(-2px);
}

    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Admissions Open 2082 | भर्ना खुला</h1>
        <p>Fill out the form below to enroll your child for the upcoming academic year.</p>
    </section>
    
    


    <!-- Form Section -->
    <section class="container">
        <!-- Back to Home Button -->
        <div class="text-center mb-4">
            <button id="topBackHomeBtn" class="btn btn-outline-primary px-4 py-2">
                ← Back to Home
            </button>
        </div>
        
        <div id="thankYouPanel" style="display:none; background:#000; color:#af6300; padding:20px; border-radius:10px; text-align:center; margin-top:20px;font-size:x-large ; cursor:pointer;">
            🎉 Thank you! Your admission inquiry has been successfully submitted.
            <br><br>
            <button id="backHomeBtn" style="padding:10px 25px; border:none; border-radius:8px; background:#0066ff; color:#fff; font-weight:600; cursor:pointer;">Back to Home</button>
        </div>
    
        <div class="admission-form"> 
            <h2>Admission Form</h2>
            <form id="admissionForm" action="https://sheetdb.io/api/v1/pju4c0b3tazxa" method="post">
                <div class="row g-3">
        
                    <!-- Name -->
                    <div class="col-12">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="name" 
                                name="data[Name]" placeholder="Your Name" required>
                            <label for="name">Your Name</label>
                        </div>
                    </div>
        
                    <!-- Email -->
                    <div class="col-12">
                        <div class="form-floating">
                            <input type="email" class="form-control" id="email" 
                                name="data[Email]" placeholder="Your Email" required>
                            <label for="email">Your Email</label>
                        </div>
                    </div>
        
                    <!-- Phone Number (Nepal - 10 digits only) -->
                    <div class="col-12">
                        <div class="form-floating">
                            <input type="tel" class="form-control" id="phone" 
                                name="data[Phone Number]" 
                                placeholder="Phone Number"
                                pattern="[0-9]{10}"
                                maxlength="10"
                                required>
                            <label for="phone">Phone Number (10 digits)</label>
                        </div>
                    </div>
        
                    <!-- Child Name -->
                    <div class="col-12">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="childName" 
                                name="data[Child Name]" placeholder="Child's Name" required>
                            <label for="childName">Child's Name</label>
                        </div>
                    </div>
        
                    <!-- Grade Dropdown -->
                    <div class="col-12">
                        <div class="form-floating">
                            <select class="form-select" id="grade" 
                                name="data[Grade]" required>
                                <option value="">Select Grade</option>
                                <option value="1">Class 1</option>
                                <option value="2">Class 2</option>
                                <option value="3">Class 3</option>
                                <option value="4">Class 4</option>
                                <option value="5">Class 5</option>
                                <option value="6">Class 6</option>
                                <option value="7">Class 7</option>
                                <option value="8">Class 8</option>
                                <option value="9">Class 9</option>
                            </select>
                            <label for="grade">Grade Interested</label>
                        </div>
                    </div>
        
                    <!-- Message -->
                    <div class="col-12">
                        <div class="form-floating">
                            <textarea class="form-control" id="message" 
                                name="data[Additional Message]" 
                                placeholder="Additional Message"></textarea>
                            <label for="message">Additional Message</label>
                        </div>
                    </div>
        
                    <div class="col-12">
                        <button class="btn btn-submit py-3 w-100" type="submit">
                            Submit Inquiry
                        </button>
                    </div>
        
                </div>
            </form>
        </div>
    </section>
    
    <script>
        // Redirect to home page when back button is clicked
document.getElementById('backHomeBtn').addEventListener('click', function() {
    window.location.href = "index.html";
});

// Optional: Redirect when clicking anywhere on the panel
document.getElementById('thankYouPanel').addEventListener('click', function(e) {
    if(e.target.id !== 'backHomeBtn'){ // avoid double trigger
        window.location.href = "index.html";
    }
});

        document.getElementById('admissionForm').addEventListener('submit', function(e) {
            e.preventDefault(); // prevent normal form submission
        
            const form = e.target;
            const formData = new FormData(form);
        
            fetch(form.action, {
                method: form.method,
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                // Hide form
                form.style.display = 'none';
        
                // Show thank you panel
                document.getElementById('thankYouPanel').style.display = 'block';
            })
            .catch(error => {
                alert('Oops! Something went wrong. Please try again.');
                console.error(error);
            });
        });
        // Redirect when top back button is clicked
document.getElementById('topBackHomeBtn').addEventListener('click', function() {
    window.location.href = "index.html";
});

        </script>
        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
